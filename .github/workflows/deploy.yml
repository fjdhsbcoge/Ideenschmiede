name: Deploy webapp to GitHub Pages

# Baut die React-Plattform (webapp/) und legt das Ergebnis in docs/ ab.
# GitHub Pages serviert dieses Repo aus "master /docs" – dadurch zeigt
# https://fjdhsbcoge.github.io/Ideenschmiede/ nach jedem Push automatisch
# die aktuellste Version, ohne manuellen Eingriff.
# Läuft bei jedem Push auf master, der die webapp betrifft – plus manuell via "Run workflow".

on:
  push:
    branches: [master]
    paths:
      - 'webapp/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write # nötig, um den docs/-Commit zu pushen

# Nur ein Deployment gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Dependencies installieren
        working-directory: webapp
        run: npm ci

      - name: Build (TypeScript + Vite)
        working-directory: webapp
        run: npm run build

      - name: Build nach docs/ spiegeln
        run: rsync -a --delete webapp/dist/ docs/

      - name: docs/-Commit pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Keine Änderungen am Build – nichts zu deployen."
            exit 0
          fi
          git commit -m "Deploy: webapp-Build nach docs/ [skip ci]"
          git push
