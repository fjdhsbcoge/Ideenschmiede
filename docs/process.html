<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideenschmiede - Process Visualization</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-tertiary: #606070;
            --accent-primary: #e94560;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary); 
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        
        /* Header */
        .header { text-align: center; margin-bottom: 48px; }
        .header h1 { font-size: 42px; margin-bottom: 16px; }
        .header p { color: var(--text-secondary); font-size: 18px; }
        
        /* Perspective Switcher */
        .perspective-switcher {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 48px;
        }
        .perspective-btn {
            padding: 16px 32px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .perspective-btn:hover {
            border-color: var(--accent-primary);
            color: var(--text-primary);
        }
        .perspective-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), #ff6b6b);
            border-color: var(--accent-primary);
            color: white;
        }
        
        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 40px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-green));
        }
        
        /* Phase */
        .phase {
            position: relative;
            margin-bottom: 48px;
            opacity: 0.4;
            transition: opacity 0.5s;
        }
        .phase.active {
            opacity: 1;
        }
        .phase-marker {
            position: absolute;
            left: -40px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .phase.active .phase-marker {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }
        .phase-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }
        .phase-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .phase-duration {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
        }
        
        /* Action Box */
        .action-box {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
        }
        .action-box.ideator { background: rgba(233, 69, 96, 0.1); border-color: rgba(233, 69, 96, 0.3); }
        .action-box.investor { background: rgba(52, 152, 219, 0.1); border-color: rgba(52, 152, 219, 0.3); }
        .action-box.builder { background: rgba(46, 204, 113, 0.1); border-color: rgba(46, 204, 113, 0.3); }
        
        .action-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .action-title.ideator { color: var(--accent-primary); }
        .action-title.investor { color: var(--accent-blue); }
        .action-title.builder { color: var(--accent-green); }
        
        /* Money Flow */
        .money-flow {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 14px;
        }
        .money-arrow {
            color: var(--accent-green);
            font-size: 20px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 16px;
        }
        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-primary);
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }
        
        /* Legend */
        .legend {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 48px;
            padding: 24px;
            background: var(--bg-secondary);
            border-radius: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.ideator { background: var(--accent-primary); }
        .legend-dot.investor { background: var(--accent-blue); }
        .legend-dot.builder { background: var(--accent-green); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .perspective-switcher { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
            .legend { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav style="position: fixed; top: 0; left: 0; right: 0; background: rgba(10, 10, 15, 0.95); border-bottom: 1px solid var(--border-color); z-index: 1000; padding: 16px 24px;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="font-size: 20px; font-weight: 700; color: var(--text-primary); text-decoration: none; display: flex; align-items: center; gap: 8px;">
                <div style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent-primary), #ff6b6b); border-radius: 8px; display: flex; align-items: center; justify-content: center;">⚡</div>
                <span>Ideenschmiede</span>
            </a>
            <div style="display: flex; gap: 8px;">
                <a href="index.html" style="padding: 10px 16px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-size: 14px;">🏠 Start</a>
                <a href="discussion.html" style="padding: 10px 16px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-size: 14px;">💡 Diskussion</a>
                <a href="marketplace.html" style="padding: 10px 16px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-size: 14px;">🛒 Marktplatz</a>
                <a href="teams.html" style="padding: 10px 16px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-size: 14px;">👥 Teams</a>
                <a href="profile.html" style="padding: 10px 16px; border-radius: 8px; text-decoration: none; color: var(--text-secondary); font-size: 14px;">👤 Profil</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding-top: 100px;">
        <div class="header">
            <h1>⚡ Ideenschmiede Process</h1>
            <p>From idea to profit - see the journey from your perspective</p>
        </div>
        
        <div class="perspective-switcher">
            <button class="perspective-btn active" onclick="setPerspective('ideator')">
                💡 Ideator
            </button>
            <button class="perspective-btn" onclick="setPerspective('investor')">
                💰 Investor
            </button>
            <button class="perspective-btn" onclick="setPerspective('builder')">
                🔨 Builder
            </button>
        </div>
        
        <div class="timeline" id="timeline">
            <!-- Phases will be inserted here -->
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot ideator"></div>
                <span>Ideator Action</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot investor"></div>
                <span>Investor Action</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot builder"></div>
                <span>Builder Action</span>
            </div>
        </div>
    </div>

    <script>

                {

                    ]
                },
                {
                    num: '3',
                    icon: '🛒',
                    title: 'Marketplace',

                        'You receive 15% of all investments immediately',
                        'Example: ₿ 1.0 raised → You get ₿ 0.15'

                },
                {
                    num: '4',
                    icon: '👥',
                    title: 'Teams Build',
                    lines: [
                        'Teams receive funding, start building',

                    ]
                },
                {
                    num: '5',

                }
            ],
            investor: [
                {
                    num: '1',
                    icon: '🔍',
                    title: 'Browse',
                    lines: [
                        'Explore ideas in Discussion',
                        'Research, read comments, evaluate',
                        'Identify promising opportunities'
                    ]
                },
                {
                    num: '2',
                    icon: '🗳️',
                    title: 'Vote',
                    lines: [
                        'Subscription required',
                        'One person, one vote',
                        'Quality ideas pass to Marketplace'
                    ]
                },
                {
                    num: '3',
                    icon: '🛒',
                    title: 'Buy Idea-Shares',
                    lines: [
                        '10M shares, fixed supply, bonding curve',
                        'Early = better price',
                        'Example: Early ₿ 0.10 → 50% | Late ₿ 0.30 → 25%'
                    ]
                },
                {
                    num: '4',
                    icon: '👥',
                    title: 'Fund Teams',
                    lines: [
                        'Choose team(s) to fund (Series A)',
                        '7 days, fixed price, Idea-Share holders only',
                        'Get Team-Shares in selected teams'
                    ]
                },
                {
                    num: '5',
                    icon: '📊',
                    title: 'Vote Milestones',
                    lines: [
                        'Vote on milestone completion',

                        'Protect your investment'
                    ]
                },
                {
                    num: '6',

            ],
            builder: [
                {
                    num: '1',
                    icon: '🔍',
                    title: 'Browse',
                    lines: [
                        'Find validated ideas in Marketplace',

                        'Identify opportunities'
                    ]
                },
                {
                    num: '2',
                    icon: '📝',
                    title: 'Apply',
                    lines: [
                        'Post proposal with roadmap, budget, milestones',
                        'Invest skin-in-game',
                        'Become first Team-Share holder'
                    ]
                },
                {
                    num: '3',
                    icon: '💰',

                    lines: [

                        '7 days, fixed price',

                    ]
                },
                {
                    num: '4',
                    icon: '🔨',
                    title: 'Build',
                    lines: [
                        'Execute roadmap, hit milestones',
                        'Funds released by milestone',
                        'Build product, get customers'
                    ]
                },
                {
                    num: '5',
                    icon: '📈',
                    title: 'Series B',
                    lines: [
                        'Optional: raise more if needed',
                        'Public can buy remaining Team-Shares',
                        'Higher price than Series A'
                    ]
                },
                {
                    num: '6',
                    icon: '💰',
                    title: 'Profit',
                    lines: [
                        'Report revenue transparently',
                        '80% to Team-Share holders',
                        'You earn based on your Team-Share %'
                    ]
                }
            ]
        };

        function setPerspective(perspective) {
            // Update buttons
            document.querySelectorAll('.perspective-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Render timeline
            renderTimeline(phases[perspective]);
        }

        function renderTimeline(phaseData) {
            const timeline = document.getElementById('timeline');
            
            timeline.innerHTML = phaseData.map((phase, index) => `
                <div class="phase active" style="animation-delay: ${index * 0.1}s">
                    <div class="phase-marker">${phase.num}</div>
                    <div class="phase-content">
                        <div class="phase-title">
                            <span>${phase.icon}</span>
                            ${phase.title}
                        </div>
                        ${phase.lines.map(line => `<p style="color: var(--text-secondary); margin-bottom: 8px;">${line}</p>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Initial render
        renderTimeline(phases.ideator);
    </script>
</body>
</html>
